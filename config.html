<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель ZeusClient</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Poppins',sans-serif;background:#0a0a0a;color:#fff;padding:20px}
        .container{max-width:1400px;margin:0 auto}
        h1{color:#ffd700;margin-bottom:20px;border-left:4px solid #ffd700;padding-left:20px}
        .stats-bar{display:flex;gap:20px;margin-bottom:30px;flex-wrap:wrap}
        .stat-card{background:rgba(0,0,0,.6);border-radius:15px;padding:15px 25px;border:1px solid rgba(255,215,0,.3)}
        .stat-card i{color:#ffd700;margin-right:10px}
        .stat-card .number{font-size:28px;font-weight:800;color:#ffd700}
        .search-box{background:rgba(0,0,0,.6);border-radius:15px;padding:15px;margin-bottom:20px;display:flex;gap:10px;flex-wrap:wrap}
        .search-box input{flex:1;padding:12px;background:rgba(255,255,255,.1);border:1px solid rgba(255,215,0,.3);border-radius:10px;color:#fff}
        .search-box button{padding:12px 25px;background:linear-gradient(135deg,#ffd700,#ffaa00);border:none;border-radius:10px;cursor:pointer;font-weight:700}
        .users-table{background:rgba(0,0,0,.6);border-radius:15px;overflow-x:auto}
        table{width:100%;border-collapse:collapse}
        th,td{padding:12px 15px;text-align:left;border-bottom:1px solid rgba(255,215,0,.2)}
        th{color:#ffd700}
        tr:hover{background:rgba(255,215,0,.05)}
        .edit-btn,.delete-btn,.reset-pass-btn,.premium-btn{background:#2c3e50;border:none;padding:6px 12px;border-radius:8px;cursor:pointer;margin:0 3px;color:#fff}
        .edit-btn{background:#f39c12}
        .delete-btn{background:#c0392b}
        .reset-pass-btn{background:#3498db}
        .premium-btn{background:#27ae60}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:2000;justify-content:center;align-items:center}
        .modal-content{background:#1a1a1a;border-radius:30px;padding:30px;max-width:500px;width:90%;border:2px solid #ffd700}
        .modal-content h3{color:#ffd700;margin-bottom:20px}
        .modal-content input{width:100%;padding:12px;margin:10px 0;background:rgba(255,255,255,.1);border:1px solid rgba(255,215,0,.3);border-radius:10px;color:#fff}
        .modal-buttons{display:flex;gap:10px;margin-top:20px}
        .btn-primary{background:linear-gradient(135deg,#ffd700,#ffaa00);border:none;padding:12px;border-radius:10px;cursor:pointer;flex:1}
        .btn-danger{background:#e74c3c;border:none;padding:12px;border-radius:10px;cursor:pointer;color:#fff;flex:1}
        .back-link{display:inline-block;margin-bottom:20px;color:#ffd700;text-decoration:none}
        .badge{display:inline-block;padding:3px 8px;border-radius:15px;font-size:11px}
        .badge-free{background:#2c3e50;color:#95a5a6}
        .badge-premium{background:#f1c40f;color:#000}
        .online-badge{background:#2ecc71;color:#fff;padding:2px 8px;border-radius:10px;font-size:10px}
        .offline-badge{background:#7f8c8d;color:#fff;padding:2px 8px;border-radius:10px;font-size:10px}
        .loading{text-align:center;padding:50px;color:#ffd700}
        .refresh-btn{background:#2c3e50;border:1px solid #ffd700;padding:12px 25px;border-radius:10px;cursor:pointer;color:#ffd700}
        .logs-btn{background:#8e44ad;border:none;padding:12px 25px;border-radius:10px;cursor:pointer;color:#fff;margin-left:10px}
        .logs-panel{background:rgba(0,0,0,.8);border-radius:15px;padding:20px;margin-top:20px;max-height:400px;overflow-y:auto}
        .log-entry{padding:10px;border-bottom:1px solid rgba(255,215,0,.2);font-size:12px}
        .log-time{color:#ffd700;margin-right:15px}
        .log-action{color:#2ecc71;margin-right:10px}
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link">← На главную</a>
    <h1><i class="fas fa-cog"></i> Админ-панель</h1>
    
    <div class="stats-bar">
        <div class="stat-card"><i class="fas fa-users"></i> Пользователей: <span class="number" id="totalUsers">0</span></div>
        <div class="stat-card"><i class="fas fa-chart-line"></i> Общий баланс: <span class="number" id="totalBalance">0</span> ₽</div>
        <div class="stat-card"><i class="fas fa-crown"></i> Premium: <span class="number" id="premiumCount">0</span></div>
        <div class="stat-card"><i class="fas fa-globe"></i> Онлайн: <span class="number" id="onlineCount">0</span></div>
        <div class="stat-card"><button class="refresh-btn" onclick="loadData()"><i class="fas fa-refresh"></i> Обновить</button></div>
        <div class="stat-card"><button class="logs-btn" onclick="showLogs()"><i class="fas fa-history"></i> Логи</button></div>
    </div>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Поиск...">
        <button onclick="searchUsers()">Поиск</button>
        <button onclick="resetSearch()">Сброс</button>
        <button onclick="syncToLocal()">Синхр. с сайтом</button>
    </div>
    
    <div id="message"></div>
    <div id="loading" class="loading"><i class="fas fa-spinner fa-pulse"></i> Загрузка...</div>
    
    <div class="users-table" id="tableContainer" style="display:none">
        <table>
            <thead>
                <tr><th>Email</th><th>Ник</th><th>Баланс</th><th>Статус</th><th>Premium до</th><th>Онлайн</th><th>Действия</th></tr>
            </thead>
            <tbody id="usersBody"></tbody>
        </table>
    </div>
    
    <div id="logsPanel" style="display:none; margin-top:20px">
        <div class="logs-panel">
            <h3 style="color:#ffd700; margin-bottom:15px"><i class="fas fa-history"></i> История действий</h3>
            <div id="logsList"></div>
        </div>
    </div>
</div>

<!-- Модальное окно изменения баланса -->
<div id="balanceModal" class="modal"><div class="modal-content"><h3>Изменение баланса</h3><p id="modalUser"></p><p>Текущий: <span id="modalCurrent">0</span> ₽</p><input type="number" id="newBalance" placeholder="Новый баланс"><div class="modal-buttons"><button class="btn-primary" onclick="saveBalance()">Сохранить</button><button class="btn-danger" onclick="closeBalanceModal()">Отмена</button></div></div></div>

<!-- Модальное окно сброса пароля -->
<div id="passwordModal" class="modal"><div class="modal-content"><h3><i class="fas fa-key"></i> Сброс пароля</h3><p id="passwordUser"></p><input type="password" id="newPassword" placeholder="Новый пароль (минимум 6 символов)"><div class="modal-buttons"><button class="btn-primary" onclick="resetPassword()">Сбросить пароль</button><button class="btn-danger" onclick="closePasswordModal()">Отмена</button></div></div></div>

<!-- Модальное окно управления подпиской -->
<div id="premiumModal" class="modal"><div class="modal-content"><h3><i class="fas fa-crown"></i> Управление подпиской</h3><p id="premiumUser"></p><p>Текущий статус: <strong id="currentPremiumStatus">-</strong></p><p>Действует до: <strong id="currentPremiumUntil">-</strong></p><div style="margin-top:20px"><button class="btn-primary" onclick="activatePremium()" style="width:100%; margin-bottom:10px"><i class="fas fa-check-circle"></i> Активировать Premium (30 дней)</button><button class="btn-danger" onclick="removePremium()" style="width:100%"><i class="fas fa-ban"></i> Убрать подписку</button></div><div class="modal-buttons" style="margin-top:20px"><button class="btn-danger" onclick="closePremiumModal()">Закрыть</button></div></div></div>

<script>
(function(){
const SB_URL='https://itnymezviisjmkttzlag.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0bnltZXp2aWlzam1rdHR6bGFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MTc3MjUsImV4cCI6MjA5MjA5MzcyNX0.aLDIHtc8nVBe_FtaKeKAGaU_EAitzYZbQAaBWwmAvso';
const sb=window.supabase.createClient(SB_URL,SB_KEY);
let allUsers=[],filtered=[],editUserId=null,passwordUserId=null,premiumUserId=null,currentAdminEmail=null;

function getOnlineUsers(){let stats=localStorage.getItem('visitor_stats');if(stats){let data=JSON.parse(stats);let now=Date.now();let online=data.onlineList.filter(i=>(now-i.time)<300000);return online.map(i=>i.id);}return[];}
function updateOnlineCount(){let online=getOnlineUsers();document.getElementById('onlineCount').innerText=online.length;return online;}
async function loadData(){document.getElementById('loading').style.display='block';document.getElementById('tableContainer').style.display='none';const{data:profiles,error}=await sb.from('profiles').select('*').order('created_at',{ascending:false});if(error){document.getElementById('loading').innerHTML='<span style="color:#e74c3c">❌ Ошибка: '+error.message+'</span>';return;}allUsers=profiles||[];filtered=[...allUsers];updateStats();renderTable();document.getElementById('loading').style.display='none';document.getElementById('tableContainer').style.display='block';}
function updateStats(){let total=allUsers.length;let totalBal=0,prem=0;for(let u of allUsers){totalBal+=u.balance||0;if(u.subscription_type==='paid'&&u.subscription_until&&new Date(u.subscription_until)>new Date())prem++;}document.getElementById('totalUsers').innerText=total;document.getElementById('totalBalance').innerText=totalBal.toLocaleString();document.getElementById('premiumCount').innerText=prem;let online=getOnlineUsers();document.getElementById('onlineCount').innerText=online.length;}
function renderTable(){let tbody=document.getElementById('usersBody');tbody.innerHTML='';let onlineIds=getOnlineUsers();for(let u of filtered){let isPrem=u.subscription_type==='paid'&&u.subscription_until&&new Date(u.subscription_until)>new Date();let isOnline=onlineIds.includes(u.id);let row=tbody.insertRow();row.insertCell(0).innerText=u.email;row.insertCell(1).innerText=u.nickname||'-';row.insertCell(2).innerHTML=`<strong style="color:#ffd700">${(u.balance||0).toLocaleString()} ₽</strong>`;row.insertCell(3).innerHTML=`<span class="badge ${isPrem?'badge-premium':'badge-free'}">${isPrem?'PREMIUM':'FREE'}</span>`;row.insertCell(4).innerText=isPrem?new Date(u.subscription_until).toLocaleDateString():'-';row.insertCell(5).innerHTML=isOnline?'<span class="online-badge">● Онлайн</span>':'<span class="offline-badge">○ Оффлайн</span>';row.insertCell(6).innerHTML=`<button class="edit-btn" onclick="openBalance('${u.id}','${u.email}',${u.balance||0})">💰 Баланс</button><button class="reset-pass-btn" onclick="openPasswordModal('${u.id}','${u.email}')">🔑 Пароль</button><button class="premium-btn" onclick="openPremiumModal('${u.id}','${u.email}',${isPrem},'${u.subscription_until||''}')">👑 Premium</button><button class="delete-btn" onclick="deleteUser('${u.id}')">🗑 Удалить</button>`;}}
function searchUsers(){let s=document.getElementById('searchInput').value.toLowerCase();filtered=allUsers.filter(u=>u.email.toLowerCase().includes(s)||(u.nickname||'').toLowerCase().includes(s));renderTable();}
function resetSearch(){document.getElementById('searchInput').value='';filtered=[...allUsers];renderTable();}
function openBalance(id,email,bal){editUserId=id;document.getElementById('modalUser').innerHTML=`<strong>${email}</strong>`;document.getElementById('modalCurrent').innerText=bal;document.getElementById('newBalance').value=bal;document.getElementById('balanceModal').style.display='flex';}
function closeBalanceModal(){document.getElementById('balanceModal').style.display='none';editUserId=null;}
async function saveBalance(){let newBal=parseInt(document.getElementById('newBalance').value);if(isNaN(newBal)||newBal<0||newBal>100000){alert('Баланс от 0 до 100000');return;}if(editUserId){const{error}=await sb.from('profiles').update({balance:newBal}).eq('id',editUserId);if(error){alert('Ошибка: '+error.message);}else{alert('✅ Баланс изменен');await logAction('change_balance',editUserId,{new_balance:newBal});closeBalanceModal();loadData();}}}
function openPasswordModal(id,email){passwordUserId=id;document.getElementById('passwordUser').innerHTML=`<strong>${email}</strong>`;document.getElementById('newPassword').value='';document.getElementById('passwordModal').style.display='flex';}
function closePasswordModal(){document.getElementById('passwordModal').style.display='none';passwordUserId=null;}
async function resetPassword(){let newPass=document.getElementById('newPassword').value;if(!newPass||newPass.length<6){alert('Пароль должен быть минимум 6 символов');return;}if(passwordUserId){try{const{error}=await sb.auth.admin.updateUserById(passwordUserId,{password:newPass});if(error){alert('Ошибка: '+error.message);}else{alert('✅ Пароль изменен!');await logAction('reset_password',passwordUserId,{new_password_set:true});closePasswordModal();}}catch(e){alert('Для сброса пароля используйте Supabase Dashboard → Authentication → Users');await logAction('reset_password_failed',passwordUserId,{error:e.message});}}}
function openPremiumModal(id,email,isPrem,until){premiumUserId=id;document.getElementById('premiumUser').innerHTML=`<strong>${email}</strong>`;document.getElementById('currentPremiumStatus').innerText=isPrem?'Активна':'Неактивна';document.getElementById('currentPremiumUntil').innerText=isPrem?new Date(until).toLocaleDateString():'-';document.getElementById('premiumModal').style.display='flex';}
function closePremiumModal(){document.getElementById('premiumModal').style.display='none';premiumUserId=null;}
async function activatePremium(){if(premiumUserId){const until=new Date();until.setDate(until.getDate()+30);const{error}=await sb.from('profiles').update({subscription_type:'paid',subscription_until:until.toISOString()}).eq('id',premiumUserId);if(error){alert('Ошибка: '+error.message);}else{alert('✅ Premium активирован на 30 дней!');await logAction('activate_premium',premiumUserId,{until:until.toISOString()});closePremiumModal();loadData();}}}
async function removePremium(){if(premiumUserId){if(confirm('Убрать подписку у пользователя?')){const{error}=await sb.from('profiles').update({subscription_type:'free',subscription_until:null}).eq('id',premiumUserId);if(error){alert('Ошибка: '+error.message);}else{alert('✅ Подписка убрана');await logAction('remove_premium',premiumUserId,{});closePremiumModal();loadData();}}}}
async function deleteUser(id){if(confirm('Удалить пользователя?')){const user=allUsers.find(u=>u.id===id);await logAction('delete_user',id,{email:user?.email});await sb.from('user_purchases').delete().eq('user_id',id);const{error}=await sb.from('profiles').delete().eq('id',id);if(error){alert('Ошибка: '+error.message);}else{alert('✅ Удален');loadData();}}}
async function logAction(action,targetId,details){try{await sb.from('admin_logs').insert({admin_email:currentAdminEmail,action:action,target_user_id:targetId,target_email:allUsers.find(u=>u.id===targetId)?.email,details:details});}catch(e){console.log('Log error:',e);}}
async function showLogs(){const panel=document.getElementById('logsPanel');if(panel.style.display==='none'){const{data:logs,error}=await sb.from('admin_logs').select('*').order('created_at',{ascending:false}).limit(50);if(!error&&logs){let html='';for(let log of logs){html+=`<div class="log-entry"><span class="log-time">${new Date(log.created_at).toLocaleString()}</span><span class="log-action">${log.action}</span><span>${log.target_email||log.target_user_id}</span><span style="color:#999;margin-left:10px">${log.details?JSON.stringify(log.details):''}</span></div>`;}document.getElementById('logsList').innerHTML=html;}panel.style.display='block';}else{panel.style.display='none';}}
function syncToLocal(){let data={};for(let u of allUsers){data[u.id]={nickname:u.nickname,email:u.email,balance:u.balance,subscription_type:u.subscription_type,subscription_until:u.subscription_until};}localStorage.setItem('zeus_profiles',JSON.stringify(data));alert('✅ Синхронизировано с сайтом');}
async function checkAdmin(){const{data:{session}}=await sb.auth.getSession();if(!session){let email=prompt('Email администратора:');let pass=prompt('Пароль:');if(email&&pass){let{error}=await sb.auth.signInWithPassword({email,password:pass});if(error){alert('Ошибка входа');window.location.href='index.html';}else{if(email==='pochat811@gmail.com'||email==='seri76759@gmail.com'){currentAdminEmail=email;loadData();setInterval(()=>{updateOnlineCount();renderTable();},10000);}else{alert('Нет прав');window.location.href='index.html';}}}else{window.location.href='index.html';}}else{if(session.user.email==='pochat811@gmail.com'||session.user.email==='seri76759@gmail.com'){currentAdminEmail=session.user.email;loadData();setInterval(()=>{updateOnlineCount();renderTable();},10000);}else{alert('Нет прав');await sb.auth.signOut();window.location.href='index.html';}}}
window.openBalance=openBalance;window.closeBalanceModal=closeBalanceModal;window.saveBalance=saveBalance;window.openPasswordModal=openPasswordModal;window.closePasswordModal=closePasswordModal;window.resetPassword=resetPassword;window.openPremiumModal=openPremiumModal;window.closePremiumModal=closePremiumModal;window.activatePremium=activatePremium;window.removePremium=removePremium;window.deleteUser=deleteUser;window.searchUsers=searchUsers;window.resetSearch=resetSearch;window.syncToLocal=syncToLocal;window.loadData=loadData;window.showLogs=showLogs;
checkAdmin();
})();
</script>
</body>
</html>
