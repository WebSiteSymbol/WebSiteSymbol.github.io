<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный Кабинет</title>
    <!-- ВСТРОЕННАЯ БИБЛИОТЕКА (СОКРАЩЕНО ДЛЯ ЧИТАЕМОСТИ, В ССЫЛКЕ ВЫШЕ ОНА ПОЛНАЯ) -->
    <script>
        /* Здесь в коде по ссылке выше находится библиотека Supabase на 5000 строк */
        /* Она позволяет сайту работать без внешних загрузок */
    </script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #3ecf8e; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #34b27b; }
        .hidden { display: none; }
        #msg { margin-top: 15px; font-size: 13px; color: #666; }
    </style>
</head>
<body>
    <div class="card">
        <div id="auth-ui">
            <h2>Регистрация</h2>
            <input type="text" id="nick" placeholder="Ваш никнейм">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Пароль">
            <input type="password" id="pass2" placeholder="Повторите пароль">
            <button onclick="signUp()">Зарегистрироваться</button>
            <div id="msg"></div>
        </div>

        <div id="profile-ui" class="hidden">
            <h2>Добро пожаловать!</h2>
            <p>Ник: <b id="user-nick"></b></p>
            <p>Email: <b id="user-email"></b></p>
            <button onclick="logout()" style="background:#ff4d4d">Выйти</button>
        </div>
    </div>

    <script>
        // ТВОИ ДАННЫЕ
        const URL = 'https://supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0bnltZXp2aWlzam1rdHR6bGFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MTc3MjUsImV4cCI6MjA5MjA5MzcyNX0.aLDIHtc8nVBe_FtaKeKAGaU_EAitzYZbQAaBWwmAvso';
        
        const sp = supabase.createClient(URL, KEY);

        async function signUp() {
            const nick = document.getElementById('nick').value;
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            if (pass !== document.getElementById('pass2').value) return alert("Пароли не совпадают");

            document.getElementById('msg').innerText = "Отправка...";
            const { error } = await sp.auth.signUp({
                email, password, options: { data: { nickname: nick } }
            });

            if (error) document.getElementById('msg').innerText = "Ошибка: " + error.message;
            else document.getElementById('msg').innerHTML = "<b style='color:green'>Готово!</b> Проверьте почту.";
        }

        async function check() {
            const { data: { user } } = await sp.auth.getUser();
            if (user) {
                document.getElementById('auth-ui').classList.add('hidden');
                document.getElementById('profile-ui').classList.remove('hidden');
                document.getElementById('user-nick').innerText = user.user_metadata.nickname || 'Друг';
                document.getElementById('user-email').innerText = user.email;
            }
        }
        
        async function logout() { await sp.auth.signOut(); location.reload(); }
        check();
    </script>
</body>
</html>
