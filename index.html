<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Сайт с Supabase</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; max-width: 100%; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 8px; background: #3ecf8e; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #34b27b; }
        .hidden { display: none; }
        #msg, #login-msg { margin-top: 15px; font-size: 13px; }
        .error { color: #e74c3c; }
        .success { color: #27ae60; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 2px solid #f3f3f3; border-top: 2px solid #3ecf8e; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 10px; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        hr { margin: 20px 0; border: none; border-top: 1px solid #eee; }
        .info { background: #e8f4f8; padding: 10px; border-radius: 8px; margin-top: 15px; font-size: 12px; color: #2980b9; }
    </style>
</head>
<body>

    <div class="card">
        <!-- Форма регистрации -->
        <div id="auth-ui">
            <h2>📝 Регистрация</h2>
            <input type="text" id="nick" placeholder="Никнейм" autocomplete="off">
            <input type="email" id="email" placeholder="Email" autocomplete="off">
            <input type="password" id="pass" placeholder="Пароль (мин. 6 символов)">
            <input type="password" id="pass2" placeholder="Повторите пароль">
            <button onclick="signUp()">Зарегистрироваться</button>
            <div id="msg"></div>
            <hr>
            <button onclick="showLoginForm()" style="background: #3498db;">🔐 Войти в аккаунт</button>
            <div class="info">
                💡 После регистрации проверьте почту (включая спам) и нажмите на ссылку подтверждения
            </div>
        </div>

        <!-- Форма входа -->
        <div id="login-ui" class="hidden">
            <h2>🔐 Вход</h2>
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-pass" placeholder="Пароль">
            <button onclick="signIn()">Войти</button>
            <div id="login-msg"></div>
            <hr>
            <button onclick="showRegisterForm()" style="background: #95a5a6;">📝 Создать аккаунт</button>
        </div>

        <!-- Личный кабинет -->
        <div id="profile-ui" class="hidden">
            <h2>👤 Личный кабинет</h2>
            <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 15px 0;">
                <p>Привет, <b id="u-nick"></b>! 🎉</p>
                <p id="u-email" style="color:gray; font-size: 14px;"></p>
                <p id="u-status" style="color:green; font-size: 12px;">✓ Email подтвержден</p>
            </div>
            <button onclick="logout()" style="background:#ff4d4d">🚪 Выйти</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // Конфигурация Supabase
        const supabaseUrl = 'https://itnymezviisjmkttzlag.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0bnltZXp2aWlzam1rdHR6bGFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MTc3MjUsImV4cCI6MjA5MjA5MzcyNX0.aLDIHtc8nVBe_FtaKeKAGaU_EAitzYZbQAaBWwmAvso';
        
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        // Получаем текущий URL для редиректа
        const getCurrentUrl = () => {
            return window.location.origin + window.location.pathname;
        };
        
        // Показать форму входа
        function showLoginForm() {
            document.getElementById('auth-ui').classList.add('hidden');
            document.getElementById('login-ui').classList.remove('hidden');
            document.getElementById('profile-ui').classList.add('hidden');
        }
        
        // Показать форму регистрации
        function showRegisterForm() {
            document.getElementById('login-ui').classList.add('hidden');
            document.getElementById('auth-ui').classList.remove('hidden');
            document.getElementById('profile-ui').classList.add('hidden');
        }
        
        // Показать профиль
        async function showProfile(user) {
            const nickname = user.user_metadata?.nickname || user.email.split('@')[0];
            document.getElementById('u-nick').textContent = nickname;
            document.getElementById('u-email').textContent = user.email;
            
            document.getElementById('auth-ui').classList.add('hidden');
            document.getElementById('login-ui').classList.add('hidden');
            document.getElementById('profile-ui').classList.remove('hidden');
        }
        
        // Обработка подтверждения email из URL
        async function handleEmailConfirmation() {
            // Проверяем hash в URL (там находятся токены)
            const hash = window.location.hash;
            
            if (hash && hash.includes('access_token')) {
                console.log('Обнаружен токен подтверждения, обрабатываем...');
                
                // Показываем индикатор загрузки
                const loadingDiv = document.createElement('div');
                loadingDiv.className = 'card';
                loadingDiv.innerHTML = '<div style="padding: 20px;"><div class="loading"></div><br>⏳ Подтверждение email...<br>Пожалуйста, подождите</div>';
                document.body.innerHTML = '';
                document.body.appendChild(loadingDiv);
                
                // Извлекаем токены из hash
                const params = new URLSearchParams(hash.substring(1));
                const accessToken = params.get('access_token');
                const refreshToken = params.get('refresh_token');
                
                if (accessToken && refreshToken) {
                    // Устанавливаем сессию
                    const { data, error } = await supabaseClient.auth.setSession({
                        access_token: accessToken,
                        refresh_token: refreshToken
                    });
                    
                    if (!error && data.session) {
                        // Успешное подтверждение
                        loadingDiv.innerHTML = '<div style="padding: 20px;"><span class="success">✓ Email успешно подтвержден!</span><br><br>Перенаправление в личный кабинет...</div>';
                        
                        setTimeout(() => {
                            // Очищаем URL и показываем профиль
                            window.history.replaceState({}, document.title, window.location.pathname);
                            location.reload();
                        }, 1500);
                    } else {
                        loadingDiv.innerHTML = '<div style="padding: 20px;"><span class="error">❌ Ошибка подтверждения: ' + (error?.message || 'Неизвестная ошибка') + '</span><br><br><button onclick="location.reload()">Обновить страницу</button></div>';
                    }
                } else {
                    loadingDiv.innerHTML = '<div style="padding: 20px;"><span class="error">❌ Неверная ссылка подтверждения</span><br><br><button onclick="location.reload()">Обновить страницу</button></div>';
                }
                
                return true;
            }
            
            return false;
        }
        
        // Проверка авторизации
        async function checkAuth() {
            // Сначала проверяем, не обрабатываем ли мы подтверждение
            const isHandlingConfirmation = await handleEmailConfirmation();
            if (isHandlingConfirmation) return;
            
            // Проверяем активную сессию
            const { data: { session }, error } = await supabaseClient.auth.getSession();
            
            if (session && !error) {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (user) {
                    await showProfile(user);
                }
            } else {
                // Показываем форму регистрации
                document.getElementById('auth-ui').classList.remove('hidden');
                document.getElementById('login-ui').classList.add('hidden');
                document.getElementById('profile-ui').classList.add('hidden');
            }
        }
        
        // Регистрация
        async function signUp() {
            const nick = document.getElementById('nick').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('pass').value;
            const password2 = document.getElementById('pass2').value;
            const msgDiv = document.getElementById('msg');
            
            if (!nick || !email || !password || !password2) {
                msgDiv.innerHTML = '<span class="error">❌ Заполните все поля!</span>';
                return;
            }
            
            if (password !== password2) {
                msgDiv.innerHTML = '<span class="error">❌ Пароли не совпадают!</span>';
                return;
            }
            
            if (password.length < 6) {
                msgDiv.innerHTML = '<span class="error">❌ Пароль должен быть не менее 6 символов!</span>';
                return;
            }
            
            msgDiv.innerHTML = '<div class="loading"></div> Отправка...';
            
            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            nickname: nick
                        },
                        emailRedirectTo: getCurrentUrl() // Важно! Редирект обратно на эту же страницу
                    }
                });
                
                if (error) {
                    msgDiv.innerHTML = `<span class="error">❌ ${error.message}</span>`;
                } else {
                    msgDiv.innerHTML = '<span class="success">✓ Письмо с подтверждением отправлено!<br>📧 Проверьте почту (и папку Спам)</span>';
                    
                    // Очищаем поля
                    document.getElementById('nick').value = '';
                    document.getElementById('email').value = '';
                    document.getElementById('pass').value = '';
                    document.getElementById('pass2').value = '';
                }
            } catch (err) {
                msgDiv.innerHTML = `<span class="error">❌ Ошибка: ${err.message}</span>`;
            }
        }
        
        // Вход
        async function signIn() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-pass').value;
            const msgDiv = document.getElementById('login-msg');
            
            if (!email || !password) {
                msgDiv.innerHTML = '<span class="error">❌ Заполните все поля!</span>';
                return;
            }
            
            msgDiv.innerHTML = '<div class="loading"></div> Вход...';
            
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password
            });
            
            if (error) {
                msgDiv.innerHTML = `<span class="error">❌ ${error.message}</span>`;
            } else if (data.user) {
                msgDiv.innerHTML = '<span class="success">✓ Успешный вход!</span>';
                await showProfile(data.user);
            }
        }
        
        // Выход
        async function logout() {
            await supabaseClient.auth.signOut();
            location.reload();
        }
        
        // Слушаем изменения авторизации
        supabaseClient.auth.onAuthStateChange((event, session) => {
            console.log('Auth event:', event);
            if (event === 'SIGNED_IN' && session) {
                checkAuth();
            }
        });
        
        // Запускаем проверку
        checkAuth();
    </script>
</body>
</html>
