<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Сайт с Supabase</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #3ecf8e; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #34b27b; }
        .hidden { display: none; }
        #msg { margin-top: 15px; font-size: 13px; color: #666; }
        .error { color: #e74c3c; }
        .success { color: #27ae60; }
    </style>
</head>
<body>

    <div class="card">
        <div id="auth-ui">
            <h2>Регистрация</h2>
            <input type="text" id="nick" placeholder="Никнейм">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Пароль">
            <input type="password" id="pass2" placeholder="Повторите пароль">
            <button onclick="signUp()">Зарегистрироваться</button>
            <div id="msg"></div>
        </div>

        <div id="profile-ui" class="hidden">
            <h2>Личный кабинет</h2>
            <p>Привет, <b id="u-nick"></b>!</p>
            <p id="u-email" style="color:gray"></p>
            <button onclick="logout()" style="background:#ff4d4d">Выйти</button>
        </div>
    </div>

    <!-- Подключаем правильную библиотеку Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // ВАЖНО: Используйте ваш реальный URL проекта Supabase!
        const supabaseUrl = 'https://itnymezviisjmkttzlag.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0bnltZXp2aWlzam1rdHR6bGFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MTc3MjUsImV4cCI6MjA5MjA5MzcyNX0.aLDIHtc8nVBe_FtaKeKAGaU_EAitzYZbQAaBWwmAvso';
        
        // Создаем клиент с другим именем переменной, чтобы избежать конфликта
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        // Функция для проверки авторизации при загрузке страницы
        async function checkAuth() {
            const { data: { session }, error } = await supabaseClient.auth.getSession();
            
            if (session && !error) {
                // Пользователь авторизован, получаем его данные
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (user) {
                    const nickname = user.user_metadata?.nickname || 'Пользователь';
                    document.getElementById('u-nick').textContent = nickname;
                    document.getElementById('u-email').textContent = user.email;
                    document.getElementById('auth-ui').classList.add('hidden');
                    document.getElementById('profile-ui').classList.remove('hidden');
                }
            }
        }
        
        // Регистрация
        async function signUp() {
            const nick = document.getElementById('nick').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('pass').value;
            const password2 = document.getElementById('pass2').value;
            const msgDiv = document.getElementById('msg');
            
            // Валидация
            if (!nick || !email || !password || !password2) {
                msgDiv.innerHTML = '<span class="error">Заполните все поля!</span>';
                return;
            }
            
            if (password !== password2) {
                msgDiv.innerHTML = '<span class="error">Пароли не совпадают!</span>';
                return;
            }
            
            if (password.length < 6) {
                msgDiv.innerHTML = '<span class="error">Пароль должен быть не менее 6 символов!</span>';
                return;
            }
            
            msgDiv.innerHTML = 'Отправка...';
            
            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            nickname: nick,
                            email: email
                        }
                    }
                });
                
                if (error) {
                    msgDiv.innerHTML = `<span class="error">Ошибка: ${error.message}</span>`;
                } else {
                    if (data.user) {
                        msgDiv.innerHTML = '<span class="success">✓ Успешно! Проверьте вашу почту для подтверждения.</span>';
                        // Очищаем поля
                        document.getElementById('nick').value = '';
                        document.getElementById('email').value = '';
                        document.getElementById('pass').value = '';
                        document.getElementById('pass2').value = '';
                    } else {
                        msgDiv.innerHTML = '<span class="success">✓ Проверьте вашу почту для подтверждения регистрации!</span>';
                    }
                }
            } catch (err) {
                msgDiv.innerHTML = `<span class="error">Ошибка соединения: ${err.message}</span>`;
            }
        }
        
        // Выход
        async function logout() {
            await supabaseClient.auth.signOut();
            location.reload();
        }
        
        // Проверяем авторизацию при загрузке страницы
        checkAuth();
        
        // Слушаем изменения состояния авторизации
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN') {
                checkAuth();
            } else if (event === 'SIGNED_OUT') {
                document.getElementById('auth-ui').classList.remove('hidden');
                document.getElementById('profile-ui').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
