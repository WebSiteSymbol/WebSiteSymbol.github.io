<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход и Регистрация</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        h2 { margin-bottom: 20px; color: #333; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #3ecf8e; color: white; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
        #msg { margin-top: 15px; font-size: 13px; color: #666; }
    </style>
</head>
<body>

    <div class="card">
        <div id="auth-ui">
            <h2>Регистрация</h2>
            <input type="text" id="nick" placeholder="Никнейм">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Пароль">
            <input type="password" id="pass2" placeholder="Повторите пароль">
            <button id="reg-btn">Зарегистрироваться</button>
            <div id="msg"></div>
        </div>

        <div id="profile-ui" class="hidden">
            <h2>Личный кабинет</h2>
            <p>Привет, <b id="user-name"></b>!</p>
            <p id="user-mail" style="color: gray;"></p>
            <button onclick="logout()" style="background: #ff4d4d;">Выйти</button>
        </div>
    </div>

    <script type="module">
        // Используем самый стабильный сервер для загрузки библиотеки
        import { createClient } from 'https://esm.sh'

        const SB_URL = 'https://supabase.co'
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0bnltZXp2aWlzam1rdHR6bGFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MTc3MjUsImV4cCI6MjA5MjA5MzcyNX0.aLDIHtc8nVBe_FtaKeKAGaU_EAitzYZbQAaBWwmAvso'
        
        const supabase = createClient(SB_URL, SB_KEY)

        // Проверка входа
        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser()
            if (user) {
                document.getElementById('auth-ui').classList.add('hidden')
                document.getElementById('profile-ui').classList.remove('hidden')
                document.getElementById('user-name').innerText = user.user_metadata.nickname || 'Пользователь'
                document.getElementById('user-mail').innerText = user.email
            }
        }

        // Регистрация
        document.getElementById('reg-btn').onclick = async () => {
            const n = document.getElementById('nick').value
            const e = document.getElementById('email').value
            const p = document.getElementById('pass').value
            const p2 = document.getElementById('pass2').value
            const m = document.getElementById('msg')

            if (p !== p2) return alert("Пароли не совпадают!")
            
            m.innerText = "Отправка..."
            const { error } = await supabase.auth.signUp({
                email: e,
                password: p,
                options: { data: { nickname: n } }
            })

            if (error) {
                m.style.color = "red"
                m.innerText = "Ошибка: " + error.message
            } else {
                m.style.color = "green"
                m.innerHTML = "<b>Успех!</b> Проверьте почту и подтвердите регистрацию."
            }
        }

        window.logout = async () => {
            await supabase.auth.signOut()
            location.reload()
        }

        checkUser()
    </script>
</body>
</html>
