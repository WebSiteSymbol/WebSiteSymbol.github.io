<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход и Регистрация</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h2 { color: #333; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; background-color: #3ecf8e; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #34b27b; }
        .hidden { display: none; }
        #message { margin-top: 15px; font-size: 14px; color: #555; line-height: 1.4; }
        .user-info { text-align: left; background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="card">
        <!-- Форма регистрации -->
        <div id="auth-form">
            <h2>Регистрация</h2>
            <input type="text" id="nickname" placeholder="Ваш никнейм">
            <input type="email" id="email" placeholder="Электронная почта">
            <input type="password" id="password" placeholder="Пароль">
            <input type="password" id="confirm-password" placeholder="Подтвердите пароль">
            <button onclick="signUp()">Зарегистрироваться</button>
            <div id="message"></div>
        </div>

        <!-- Личный кабинет -->
        <div id="profile" class="hidden">
            <h2>Личный кабинет</h2>
            <div class="user-info">
                <p><strong>Никнейм:</strong> <span id="user-nickname"></span></p>
                <p><strong>Email:</strong> <span id="user-email"></span></p>
            </div>
            <button style="background-color: #ff4d4d;" onclick="signOut()">Выйти из аккаунта</button>
        </div>
    </div>

    <script>
        // Инициализация Supabase с вашими данными
        const supabaseUrl = 'https://supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0bnltZXp2aWlzam1rdHR6bGFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MTc3MjUsImV4cCI6MjA5MjA5MzcyNX0.aLDIHtc8nVBe_FtaKeKAGaU_EAitzYZbQAaBWwmAvso';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function signUp() {
            const nickname = document.getElementById('nickname').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;
            const msgDiv = document.getElementById('message');

            if (!nickname || !email || !password) return alert("Заполните все поля!");
            if (password !== confirm) return alert("Пароли не совпадают!");

            msgDiv.innerText = "Отправка данных...";

            const { data, error } = await _supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: { nickname: nickname }
                }
            });

            if (error) {
                msgDiv.style.color = "red";
                msgDiv.innerText = "Ошибка: " + error.message;
            } else {
                msgDiv.style.color = "green";
                msgDiv.innerText = "Успешно! Перейдите в почту (" + email + ") и подтвердите регистрацию, чтобы войти в кабинет.";
                // Очищаем форму
                document.querySelectorAll('input').forEach(i => i.value = '');
            }
        }

        async function checkUser() {
            const { data: { user } } = await _supabase.auth.getUser();
            
            if (user) {
                document.getElementById('auth-form').classList.add('hidden');
                document.getElementById('profile').classList.remove('hidden');
                document.getElementById('user-nickname').innerText = user.user_metadata.nickname || 'Не указан';
                document.getElementById('user-email').innerText = user.email;
            }
        }

        async function signOut() {
            await _supabase.auth.signOut();
            window.location.reload();
        }

        // Проверяем статус пользователя при каждой загрузке страницы
        checkUser();
    </script>
</body>
</html>
