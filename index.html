        button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #3ecf8e; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }

<body>

    <div class="card">
        <div id="auth-ui">
            <h2>Регистрация</h2>
            <input type="text" id="nick" placeholder="Никнейм">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Пароль">
            <input type="password" id="pass2" placeholder="Повторите пароль">
            <button onclick="signUp()">Зарегистрироваться</button>
            <div id="msg"></div>
        </div>

        <div id="profile-ui" class="hidden">
            <h2>Личный кабинет</h2>
            <p>Привет, <b id="u-nick"></b>!</p>
            <p id="u-email" style="color:gray"></p>
            <button onclick="logout()" style="background:#ff4d4d">Выйти</button>
        </div>
    </div>

    <script>
        // Твои данные подключения
        const CONF = {
            url: 'https://supabase.co',
            key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0bnltZXp2aWlzam1rdHR6bGFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MTc3MjUsImV4cCI6MjA5MjA5MzcyNX0.aLDIHtc8nVBe_FtaKeKAGaU_EAitzYZbQAaBWwmAvso'
        };

        // Мы будем использовать стандартный Fetch API, если библиотека не грузится
        async function signUp() {
            const nick = document.getElementById('nick').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const msg = document.getElementById('msg');

            if (password !== document.getElementById('pass2').value) return alert("Пароли не совпадают");
            msg.innerText = "Отправка...";

            // Прямой запрос к API Supabase (работает без библиотек!)
            const res = await fetch(`${CONF.url}/auth/v1/signup`, {
                method: 'POST',
                headers: {
                    'apikey': CONF.key,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    email: email,
                    password: password,
                    data: { nickname: nick }
                })
            });

            const data = await res.json();
            if (data.error) {
                msg.innerText = "Ошибка: " + data.error.message;
            } else {
                msg.innerHTML = "<b style='color:green'>Успех!</b> Проверь почту.";
            }
        }

        async function check() {

        }
        
        function logout() { localStorage.clear(); location.reload(); }
